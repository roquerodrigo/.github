name: SDK Release (reusable)

# Two-stage release:
#  1. ``release-please`` opens / merges the release PR and tags the version.
#  2. On a fresh tag (or via ``workflow_dispatch``) build and publish to
#     PyPI using OIDC trusted publishing — no API token stored anywhere.

on:
  workflow_call:
    inputs:
      pypi-package:
        description: "Package name on PyPI (used for the environment URL)"
        required: true
        type: string
      python-version:
        required: false
        type: string
        default: "3.14"
      dispatch-tag:
        description: "Tag forwarded from a workflow_dispatch caller, when re-publishing."
        required: false
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    if: inputs.dispatch-tag == ''
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-pypi:
    name: Publish to PyPI
    needs: release-please
    if: |
      always() && (
        inputs.dispatch-tag != '' ||
        needs.release-please.outputs.release_created == 'true'
      )
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/${{ inputs.pypi-package }}
    permissions:
      id-token: write
    steps:
      - name: Checkout the released tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.dispatch-tag != '' && inputs.dispatch-tag || needs.release-please.outputs.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
