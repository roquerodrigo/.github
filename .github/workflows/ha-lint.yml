name: HA Lint (reusable)

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.14"

permissions: {}

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@bd01e18f51369d5a26f1651c3cb451d3417e3bba # v6.4.3

      - name: Set up Python
        run: uv python install ${{ inputs.python-version }}

      - name: Install dependencies
        run: uv sync --group dev --group lint

      - name: Lint
        run: uv run ruff check .

      - name: Format
        run: uv run ruff format . --check

  mypy:
    name: Mypy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@bd01e18f51369d5a26f1651c3cb451d3417e3bba # v6.4.3

      - name: Set up Python
        run: uv python install ${{ inputs.python-version }}

      - name: Install dependencies
        run: uv sync --group dev --group lint

      - name: Type check
        run: uv run mypy

  version-check:
    # Catches drift between the two version sources: ``manifest.json``
    # (what HA reads at runtime) and ``pyproject.toml`` ``[project]``
    # (what release-please bumps alongside it). Release-please writes
    # both atomically; this job guards against manual edits that touch
    # only one.
    name: Version check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Compare manifest.json and pyproject.toml versions
        run: |
          set -euo pipefail
          manifest_version=$(jq -r '.version' custom_components/*/manifest.json)
          pyproject_version=$(grep -m1 '^version' pyproject.toml | awk -F'"' '{print $2}')
          echo "manifest.json:  $manifest_version"
          echo "pyproject.toml: $pyproject_version"
          if [ "$manifest_version" != "$pyproject_version" ]; then
            echo "::error::Version mismatch — manifest.json ($manifest_version) != pyproject.toml ($pyproject_version). Update both or rely on release-please."
            exit 1
          fi
