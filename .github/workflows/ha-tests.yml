name: HA Tests (reusable)

# Coverage threshold lives in the consumer's pyproject.toml so local
# runs and CI agree. The reusable just invokes pytest.

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.14"

permissions:
  contents: read

jobs:
  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@bd01e18f51369d5a26f1651c3cb451d3417e3bba # v6.4.3

      - name: Set up Python
        run: uv python install ${{ inputs.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest
