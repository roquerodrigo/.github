name: HA Auto-assign (reusable)

on:
  workflow_call:
    inputs:
      assignee:
        required: false
        type: string
        default: roquerodrigo

permissions:
  pull-requests: write

jobs:
  assign:
    name: Assign @${{ inputs.assignee }}
    runs-on: ubuntu-latest
    steps:
      - name: Add assignee
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUMBER: ${{ github.event.pull_request.number }}
          GH_REPO: ${{ github.repository }}
          ASSIGNEE: ${{ inputs.assignee }}
        # ``gh pr edit --add-assignee`` is not idempotent — it errors with
        # "Assignee has already been taken" if the user is already on the
        # PR. Check first so re-runs and overlap with the old
        # ``pull_request_target`` workflow during the migration don't fail
        # the job.
        run: |
          if gh pr view "$NUMBER" --json assignees --jq '.assignees[].login' | grep -qFx "$ASSIGNEE"; then
            echo "$ASSIGNEE already assigned to PR #$NUMBER"
            exit 0
          fi
          gh pr edit "$NUMBER" --add-assignee "$ASSIGNEE"
