name: HA Auto-assign (reusable)

on:
  workflow_call:
    inputs:
      assignee:
        required: false
        type: string
        default: roquerodrigo

permissions:
  pull-requests: write

jobs:
  assign:
    name: Assign @${{ inputs.assignee }}
    runs-on: ubuntu-latest
    steps:
      - name: Add assignee
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUMBER: ${{ github.event.pull_request.number }}
          GH_REPO: ${{ github.repository }}
          ASSIGNEE: ${{ inputs.assignee }}
        run: gh pr edit "$NUMBER" --add-assignee "$ASSIGNEE"
